name: Deploy to Anypoint Platform

on:
  push:
    branches:
      - 'release/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Mule app
    runs-on: ubuntu-latest
    environment: ${{ vars.GITHUB_DEPLOYMENT_ENVIRONMENT || 'anypoint' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build and deploy to CloudHub 2.0
        run: |
          mvn --batch-mode --update-snapshots -U clean deploy -DmuleDeploy \
            -Danypoint.client.id="${ANYPOINT_CLIENT_ID}" \
            -Danypoint.client.secret="${ANYPOINT_CLIENT_SECRET}" \
            -Danypoint.business.group.id="${ANYPOINT_BUSINESS_GROUP_ID}" \
            -Danypoint.environment="${ANYPOINT_ENVIRONMENT}" \
            -Danypoint.target="${ANYPOINT_TARGET}" \
            -Dcloudhub.application.name="${CLOUDHUB_APP_NAME}" \
            -Dcloudhub.replicas="${CLOUDHUB_REPLICAS:-1}" \
            -Dcloudhub.vcores="${CLOUDHUB_VCORES:-0.1}" \
            -Dapi.manager.id="${API_MANAGER_ID}" \
            ${MULE_RUNTIME_VERSION:+-Dmule.runtime.version="${MULE_RUNTIME_VERSION}"}
        env:
          ANYPOINT_CLIENT_ID: ${{ secrets.ANYPOINT_CLIENT_ID }}
          ANYPOINT_CLIENT_SECRET: ${{ secrets.ANYPOINT_CLIENT_SECRET }}
          ANYPOINT_BUSINESS_GROUP_ID: ${{ secrets.ANYPOINT_BUSINESS_GROUP_ID }}
          ANYPOINT_ENVIRONMENT: ${{ secrets.ANYPOINT_ENVIRONMENT }}
          ANYPOINT_TARGET: ${{ secrets.ANYPOINT_TARGET }}
          CLOUDHUB_APP_NAME: ${{ secrets.CLOUDHUB_APP_NAME }}
          API_MANAGER_ID: ${{ secrets.API_MANAGER_ID }}
          CLOUDHUB_REPLICAS: ${{ vars.CLOUDHUB_REPLICAS }}
          CLOUDHUB_VCORES: ${{ vars.CLOUDHUB_VCORES }}
          MULE_RUNTIME_VERSION: ${{ vars.MULE_RUNTIME_VERSION }}
